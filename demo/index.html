<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Docker Compose</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=JetBrains+Mono:wght@400;700&display=swap");

      :root {
        --ocean-deep: #0d1b2a;
        --ocean-mid: #1a3a5c;
        --ocean-light: #1d6fa4;
        --docker-blue: #2496ed;
        --foam: #e8f4fc;
        --white: #ffffff;
        --accent: #00c2e0;
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        background: var(--ocean-deep);
        color: var(--foam);
        font-family: "Space Grotesk", sans-serif;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        position: relative;
      }

      /* ── Animated ocean background ── */
      .ocean {
        position: fixed;
        inset: 0;
        z-index: 0;
        overflow: hidden;
      }
      .wave {
        position: absolute;
        bottom: 0;
        width: 200%;
        height: 180px;
        background: var(--ocean-mid);
        opacity: 0.35;
        border-radius: 45% 55% 0 0 / 30% 30% 0 0;
        animation: wave 8s ease-in-out infinite;
      }
      .wave:nth-child(2) {
        height: 140px;
        opacity: 0.25;
        animation-duration: 11s;
        animation-delay: -3s;
        background: var(--ocean-light);
      }
      .wave:nth-child(3) {
        height: 100px;
        opacity: 0.2;
        animation-duration: 14s;
        animation-delay: -6s;
        background: var(--docker-blue);
      }
      @keyframes wave {
        0%,
        100% {
          transform: translateX(-25%) scaleY(1);
        }
        50% {
          transform: translateX(0%) scaleY(1.12);
        }
      }

      /* ── Bubbles ── */
      .bubble {
        position: fixed;
        border-radius: 50%;
        background: rgba(36, 150, 237, 0.15);
        border: 1px solid rgba(36, 150, 237, 0.3);
        animation: rise linear infinite;
        z-index: 0;
      }
      @keyframes rise {
        0% {
          transform: translateY(110vh) scale(0.8);
          opacity: 0;
        }
        10% {
          opacity: 1;
        }
        90% {
          opacity: 1;
        }
        100% {
          transform: translateY(-10vh) scale(1.1);
          opacity: 0;
        }
      }

      /* ── Main card ── */
      .card {
        position: relative;
        z-index: 10;
        text-align: center;
        padding: 3rem 3.5rem 2.5rem;
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid rgba(36, 150, 237, 0.25);
        border-radius: 24px;
        backdrop-filter: blur(18px);
        max-width: 520px;
        width: 90%;
        box-shadow:
          0 0 60px rgba(36, 150, 237, 0.12),
          0 20px 40px rgba(0, 0, 0, 0.4);
      }

      /* ── Docker whale SVG ── */
      .whale-wrap {
        display: inline-block;
        margin-bottom: 1.6rem;
        animation: bob 3.5s ease-in-out infinite;
      }
      @keyframes bob {
        0%,
        100% {
          transform: translateY(0px) rotate(-1deg);
        }
        50% {
          transform: translateY(-12px) rotate(1deg);
        }
      }

      /* ── Containers on whale's back ── */
      .container-stack {
        animation: stackBlink 4s ease-in-out infinite;
      }
      @keyframes stackBlink {
        0%,
        90%,
        100% {
          opacity: 1;
        }
        45% {
          opacity: 0.7;
        }
      }

      /* ── Title ── */
      h1 {
        font-family: "Space Grotesk", sans-serif;
        font-weight: 700;
        font-size: clamp(1.6rem, 5vw, 2.4rem);
        letter-spacing: -0.02em;
        color: var(--white);
        margin-bottom: 0.5rem;
      }
      h1 span {
        color: var(--docker-blue);
      }

      /* ── Subtitle badge ── */
      .badge {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        margin: 1rem 0 1.6rem;
        padding: 0.45rem 1rem;
        background: rgba(36, 150, 237, 0.15);
        border: 1px solid rgba(36, 150, 237, 0.35);
        border-radius: 999px;
        font-family: "JetBrains Mono", monospace;
        font-size: 0.85rem;
        color: var(--accent);
        letter-spacing: 0.05em;
      }
      .badge::before {
        content: "";
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: var(--accent);
        box-shadow: 0 0 6px var(--accent);
        animation: pulse 1.8s ease-in-out infinite;
      }
      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
          transform: scale(1);
        }
        50% {
          opacity: 0.5;
          transform: scale(0.8);
        }
      }

      /* ── Code block ── */
      .code-block {
        background: rgba(0, 0, 0, 0.45);
        border: 1px solid rgba(36, 150, 237, 0.2);
        border-radius: 12px;
        padding: 1.2rem 1.4rem;
        text-align: left;
        font-family: "JetBrains Mono", monospace;
        font-size: 0.82rem;
        line-height: 1.8;
        color: #a8c7e8;
        margin-bottom: 1.6rem;
      }
      .code-block .kw {
        color: #79c0ff;
      }
      .code-block .val {
        color: #a5d6a7;
      }
      .code-block .cm {
        color: #586e75;
      }
      .code-block .svc {
        color: var(--accent);
        font-weight: 600;
      }

      /* ── Footer ── */
      .footer-text {
        font-size: 0.78rem;
        color: rgba(255, 255, 255, 0.35);
        letter-spacing: 0.04em;
      }
    </style>
  </head>
  <body>
    <!-- Ocean -->
    <div class="ocean">
      <div class="wave"></div>
      <div class="wave"></div>
      <div class="wave"></div>
    </div>

    <!-- Bubbles injected via JS -->

    <!-- Main card -->
    <div class="card">
      <!-- Docker whale SVG -->
      <div class="whale-wrap">
        <svg
          width="160"
          height="110"
          viewBox="0 0 160 110"
          fill="none"
          xmlns="http://www.w3.org/2000/svg"
          aria-label="Docker whale"
        >
          <!-- Container stack on back -->
          <g class="container-stack">
            <!-- row 1 -->
            <rect
              x="38"
              y="20"
              width="16"
              height="12"
              rx="2"
              fill="#2496ED"
              opacity=".9"
            />
            <rect
              x="56"
              y="20"
              width="16"
              height="12"
              rx="2"
              fill="#1D6FA4"
              opacity=".9"
            />
            <rect
              x="74"
              y="20"
              width="16"
              height="12"
              rx="2"
              fill="#2496ED"
              opacity=".9"
            />
            <rect
              x="92"
              y="20"
              width="16"
              height="12"
              rx="2"
              fill="#1D6FA4"
              opacity=".9"
            />
            <!-- row 2 -->
            <rect
              x="47"
              y="9"
              width="16"
              height="12"
              rx="2"
              fill="#00C2E0"
              opacity=".85"
            />
            <rect
              x="65"
              y="9"
              width="16"
              height="12"
              rx="2"
              fill="#2496ED"
              opacity=".85"
            />
            <rect
              x="83"
              y="9"
              width="16"
              height="12"
              rx="2"
              fill="#00C2E0"
              opacity=".85"
            />
            <!-- row 3 -->
            <rect
              x="56"
              y="-1"
              width="16"
              height="12"
              rx="2"
              fill="#2496ED"
              opacity=".8"
            />
            <rect
              x="74"
              y="-1"
              width="16"
              height="12"
              rx="2"
              fill="#00C2E0"
              opacity=".8"
            />
          </g>

          <!-- Whale body -->
          <ellipse cx="78" cy="68" rx="58" ry="30" fill="#1A3A5C" />
          <!-- Belly highlight -->
          <ellipse
            cx="72"
            cy="72"
            rx="34"
            ry="16"
            fill="#22517A"
            opacity=".6"
          />

          <!-- Tail -->
          <path
            d="M20 68 C8 58 2 48 10 42 C14 56 24 62 20 68Z"
            fill="#1A3A5C"
          />
          <path
            d="M20 68 C8 78 2 88 10 94 C14 80 24 74 20 68Z"
            fill="#1A3A5C"
          />

          <!-- Head bump -->
          <ellipse cx="120" cy="58" rx="22" ry="20" fill="#1A3A5C" />

          <!-- Eye -->
          <circle cx="126" cy="54" r="5" fill="white" />
          <circle cx="127" cy="54" r="2.5" fill="#0D1B2A" />
          <circle cx="128" cy="53" r="1" fill="white" />

          <!-- Smile -->
          <path
            d="M116 64 Q122 70 130 64"
            stroke="#00C2E0"
            stroke-width="1.8"
            stroke-linecap="round"
            fill="none"
          />

          <!-- Spout -->
          <path
            d="M124 38 Q120 22 126 10 Q130 22 136 10 Q138 24 132 38"
            fill="#00C2E0"
            opacity=".7"
          />

          <!-- Fin -->
          <path d="M60 88 Q50 105 40 100 Q52 96 60 88Z" fill="#14304F" />
        </svg>
      </div>

      <h1>Hello, <span>Docker</span>!</h1>

      <div class="badge">docker compose up -d</div>

      <div class="code-block">
        <p class="cm"># docker-compose.yml</p>
      </div>

      <p class="footer-text">Shipped with 🐳 Docker Compose</p>
    </div>

    <script>
      // Spawn random bubbles
      (function () {
        const sizes = [10, 16, 22, 30, 12, 18];
        for (let i = 0; i < 18; i++) {
          const b = document.createElement("div");
          b.className = "bubble";
          const s = sizes[Math.floor(Math.random() * sizes.length)];
          b.style.cssText = `
          width:${s}px; height:${s}px;
          left:${Math.random() * 100}vw;
          animation-duration:${6 + Math.random() * 10}s;
          animation-delay:${-Math.random() * 14}s;
        `;
          document.body.appendChild(b);
        }
      })();
    </script>
  </body>
</html>
