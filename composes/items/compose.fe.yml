services:
  fe:
    build:
      context: ./todo-list-react
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL}
    image: sangdq02/todo-react:v2
    restart: always
    ports:
      - "4200:80"
    networks:
      - fe-tier
    depends_on:
      be:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
