services:
  be:
    build:
      context: ./todo-list-dotnet/TodoApi
    image: sangdq02/todo-dotnet:v2
    restart: always
    ports:
      - "${VITE_API_PORT}:8080"
    environment:
      MongoDB__ConnectionString: mongodb://${MONGO_USERNAME}:${MONGO_PASSWORD}@db:27017/?authSource=admin
      MongoDB__DatabaseName: todolist
    networks:
      - be-tier
      - fe-tier
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
